        if (selectedFlowId) {

        return null;

      function resizeCanvas() {
        const ratio = window.devicePixelRatio || 1;
        const width = window.innerWidth;
        const height = window.innerHeight;

        if (canvas.width !== Math.round(width * ratio) || canvas.height !== Math.round(height * ratio)) {
          canvas.width = Math.round(width * ratio);
          canvas.height = Math.round(height * ratio);
        }
      }

      function getScreenSize() {
        return {
          width: window.innerWidth,
          height: window.innerHeight,
          ratio: window.devicePixelRatio || 1,
        };
      }

      function worldToScreen(x, y) {
        const { width, height } = getScreenSize();
        return {
          x: ((x - camera.x) / camera.width) * width,
          y: ((y - camera.y) / camera.height) * height,
        };
      }

      function screenToWorld(x, y) {
        const { width, height } = getScreenSize();
        return {
          x: camera.x + (x / width) * camera.width,
          y: camera.y + (y / height) * camera.height,
        };
      }

      function clampCamera() {
        const pad = 220;
        camera.x = Math.min(Math.max(camera.x, -pad), world.width - camera.width + pad);
        camera.y = Math.min(Math.max(camera.y, -pad), world.height - camera.height + pad);
      }

      function panBy(dx, dy) {
        camera.x += dx;
        camera.y += dy;
        clampCamera();
        draw();
      }

      function zoomBy(factor) {
        const nextWidth = Math.min(2800, Math.max(900, camera.width * factor));
        const nextHeight = Math.min(2000, Math.max(600, camera.height * factor));
        camera.x -= (nextWidth - camera.width) / 2;
        camera.y -= (nextHeight - camera.height) / 2;
        camera.width = nextWidth;
        camera.height = nextHeight;
        clampCamera();
        draw();
      }

      function resetCamera() {
        Object.assign(camera, initialCamera);
        draw();
      }

      function roundedRectPath(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawBackground(ctx, screenWidth, screenHeight, ratio) {
        const radial = ctx.createRadialGradient(screenWidth * 0.5, 0, 40, screenWidth * 0.5, 0, screenHeight * 0.7);
        radial.addColorStop(0, "rgba(41, 97, 124, 0.24)");
        radial.addColorStop(1, palette.bg);
        ctx.fillStyle = radial;
        ctx.fillRect(0, 0, screenWidth, screenHeight);

        drawGrid(ctx, screenWidth, screenHeight, 24, palette.gridMinor, 1, ratio);
        drawGrid(ctx, screenWidth, screenHeight, 120, palette.gridMajor, 1.4, ratio);
      }

      function drawGrid(ctx, screenWidth, screenHeight, spacingWorld, color, lineWidth, ratio) {
        const startX = Math.floor(camera.x / spacingWorld) * spacingWorld;
        const endX = camera.x + camera.width;
        const startY = Math.floor(camera.y / spacingWorld) * spacingWorld;
        const endY = camera.y + camera.height;

        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();

        for (let x = startX; x <= endX; x += spacingWorld) {
          const sx = ((x - camera.x) / camera.width) * screenWidth;
          ctx.moveTo(sx, 0);
          ctx.lineTo(sx, screenHeight);
        }

        for (let y = startY; y <= endY; y += spacingWorld) {
          const sy = ((y - camera.y) / camera.height) * screenHeight;
          ctx.moveTo(0, sy);
          ctx.lineTo(screenWidth, sy);
        }

        ctx.stroke();
        ctx.restore();
      }

      function applyWorldTransform(ctx, ratio, screenWidth, screenHeight) {
        ctx.setTransform(
          (screenWidth / camera.width) * ratio,
          0,
          0,
          (screenHeight / camera.height) * ratio,
          (-camera.x * screenWidth * ratio) / camera.width,
          (-camera.y * screenHeight * ratio) / camera.height,
        );
      }

      function drawGuide(ctx) {
        ctx.save();
        ctx.setLineDash([12, 10]);
        ctx.strokeStyle = palette.accent;
        ctx.lineWidth = 2.5;
        roundedRectPath(ctx, 84, 74, 2232, 1452, 0);
        ctx.stroke();
        ctx.restore();

        const handles = [
          [84, 74],
          [1200, 74],
          [2316, 74],
          [84, 800],
          [2316, 800],
          [84, 1526],
          [1200, 1526],
          [2316, 1526],
        ];

        ctx.save();
        ctx.fillStyle = palette.accent;
        ctx.strokeStyle = palette.handleStroke;
        ctx.lineWidth = 3;
        for (const [x, y] of handles) {
          ctx.beginPath();
          ctx.arc(x, y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBoundaryArrows(ctx) {
        const arrows = [
          { x1: 8, y1: 800, x2: 56, y2: 800, dir: "left" },
          { x1: 2392, y1: 800, x2: 2344, y2: 800, dir: "right" },
          { x1: 1200, y1: 8, x2: 1200, y2: 56, dir: "up" },
          { x1: 1200, y1: 1592, x2: 1200, y2: 1544, dir: "down" },
        ];

        ctx.save();
        ctx.strokeStyle = palette.accent;
        ctx.fillStyle = palette.accentSoft;
        ctx.lineWidth = 4;
        ctx.globalAlpha = 0.4;

        for (const arrow of arrows) {
          ctx.beginPath();
          ctx.moveTo(arrow.x1, arrow.y1);
          ctx.lineTo(arrow.x2, arrow.y2);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        for (const arrow of arrows) {
          ctx.beginPath();
          if (arrow.dir === "left") {
            ctx.moveTo(8, 800);
            ctx.lineTo(32, 780);
            ctx.lineTo(32, 820);
          } else if (arrow.dir === "right") {
            ctx.moveTo(2392, 800);
            ctx.lineTo(2368, 780);
            ctx.lineTo(2368, 820);
          } else if (arrow.dir === "up") {
            ctx.moveTo(1200, 8);
            ctx.lineTo(1180, 32);
            ctx.lineTo(1220, 32);
          } else {
            ctx.moveTo(1200, 1592);
            ctx.lineTo(1180, 1568);
            ctx.lineTo(1220, 1568);
          }
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = palette.accent;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawFrame(ctx) {
        const gradient = context.createLinearGradient(130, 120, 2270, 1480);
        gradient.addColorStop(0, palette.frameFillTop);
        gradient.addColorStop(1, palette.frameFillBottom);

        ctx.save();
        roundedRectPath(ctx, 130, 120, 2140, 1360, 125);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = palette.frameStroke;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();
      }

      function getAnchor(node, direction) {
        if (direction === "top") {
          return { x: node.x + node.width / 2, y: node.y };
        }
        if (direction === "bottom") {
          return { x: node.x + node.width / 2, y: node.y + node.height };
        }
        if (direction === "left") {
          return { x: node.x, y: node.y + node.height / 2 };
        }
        return { x: node.x + node.width, y: node.y + node.height / 2 };
      }

      function edgePath(edge) {
        const from = getNode(edge.from);
        const to = getNode(edge.to);

        if (!from || !to) {
          return [];
        }

        if (edge.mode === "side") {
          const start = getAnchor(from, "right");
          const end = getAnchor(to, "left");
          const midX = (start.x + end.x) / 2;
          return [start, { x: midX, y: start.y }, { x: midX, y: end.y }, end];
        }

        const start = getAnchor(from, "bottom");
        const end = getAnchor(to, "top");
        const midY = start.y + Math.min(82, Math.max(48, (end.y - start.y) * 0.45));
        return [start, { x: start.x, y: midY }, { x: end.x, y: midY }, end];
      }

      function drawArrow(ctx, from, to, size) {
        const angle = Math.atan2(to.y - from.y, to.x - from.x);
        ctx.beginPath();
        ctx.moveTo(to.x, to.y);
        ctx.lineTo(to.x - Math.cos(angle - Math.PI / 6) * size, to.y - Math.sin(angle - Math.PI / 6) * size);
        ctx.lineTo(to.x - Math.cos(angle + Math.PI / 6) * size, to.y - Math.sin(angle + Math.PI / 6) * size);
        ctx.closePath();
        ctx.fill();
      }

      function drawEdges(ctx, activeNodes) {
        ctx.save();
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        for (const edge of edges) {
          const points = edgePath(edge);
          if (points.length === 0) {
            continue;
          }

          const highlighted = activeNodes ? activeNodes.has(edge.from) && activeNodes.has(edge.to) : false;

          ctx.globalAlpha = !activeNodes || highlighted ? 1 : 0.16;
          ctx.strokeStyle = highlighted ? palette.accent : palette.frameStroke;
          ctx.fillStyle = highlighted ? palette.accent : palette.frameStroke;
          ctx.lineWidth = highlighted ? 3 : 2.5;

          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let index = 1; index < points.length; index += 1) {
            ctx.lineTo(points[index].x, points[index].y);
          }
          ctx.stroke();

          const last = points[points.length - 1];
          const beforeLast = points[points.length - 2];
          drawArrow(ctx, beforeLast, last, 14);
        }

        ctx.restore();
      }

      function drawNode(ctx, node, activeNodes) {
        ctx.save();
        const highlighted = activeNodes ? activeNodes.has(node.id) : node.id === selectedNodeId;
        const dimmed = activeNodes ? !highlighted : selectedNodeId !== null && node.id !== selectedNodeId;

        ctx.globalAlpha = dimmed ? 0.24 : 1;

        if (highlighted) {
          ctx.shadowColor = palette.accentGlow;
          ctx.shadowBlur = 24;
        }

        roundedRectPath(ctx, node.x, node.y, node.width, node.height, 22);
        ctx.fillStyle = highlighted ? "rgba(51, 184, 255, 0.08)" : palette.nodeFill;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = highlighted ? palette.accent : palette.frameStroke;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.fillStyle = palette.accent;
        ctx.font = '700 12px "Avenir Next", "Trebuchet MS", sans-serif';
        ctx.letterSpacing = "2px";
        ctx.fillText(node.layer, node.x + 22, node.y + 28);

        ctx.fillStyle = palette.text;
        ctx.font = '700 20px "Avenir Next", "Trebuchet MS", sans-serif';
        ctx.fillText(node.title[0], node.x + 22, node.y + 60);
        ctx.fillText(node.title[1], node.x + 22, node.y + 86);

        for (let index = 0; index < node.lines.length; index += 1) {
          const line = node.lines[index];
          const y = node.y + 118 + index * 20;
          ctx.fillStyle = palette.textMuted;
          ctx.font = line.kind === "bullet" ? '500 13px "Avenir Next", "Trebuchet MS", sans-serif' : '500 16px "Avenir Next", "Trebuchet MS", sans-serif';
          const text = line.kind === "bullet" ? `• ${line.text}` : line.text;
          ctx.fillText(text, node.x + 22, y);
        }

        if (node.accentDiamond) {
          const cx = node.x + node.width - 44;
          const cy = node.y + 28;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(Math.PI / 4);
          ctx.fillStyle = palette.diamond;
          ctx.strokeStyle = palette.diamondStroke;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.rect(-8, -8, 16, 16);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }

      function drawCaption(ctx) {
        ctx.save();
        ctx.fillStyle = palette.caption;
        ctx.font = '500 18px "Avenir Next", "Trebuchet MS", sans-serif';
        ctx.fillText("Thoth conv-agent code map", 160, 1420);
        ctx.fillText("Flows, services, repository ports, and concrete adapters are split into separate rows.", 160, 1450);
        ctx.restore();
      }

      function drawControls(ctx, screenWidth, screenHeight) {
        const panel = {
          x: 28,
          y: screenHeight - 118,
          width: 760,
          height: 82,
        };

        ctx.save();
        roundedRectPath(ctx, panel.x, panel.y, panel.width, panel.height, 16);
        ctx.fillStyle = palette.panel;
        ctx.fill();
        ctx.strokeStyle = palette.panelBorder;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = palette.caption;
        ctx.font = '500 13px "Avenir Next", "Trebuchet MS", sans-serif';
        ctx.fillText("Click a flow to highlight its full path. Drag to pan. Arrow keys or WASD scroll.", panel.x + 16, panel.y + 34);
        ctx.fillText("Wheel pans. Ctrl/Cmd + wheel or +/- zoom. Press 0 to reset.", panel.x + 16, panel.y + 56);
        ctx.restore();
      }

      function drawFocusRing(ctx, screenWidth, screenHeight) {
        if (document.activeElement !== canvas) {
          return;
        }

        ctx.save();
        ctx.strokeStyle = "rgba(51, 184, 255, 0.5)";
        ctx.lineWidth = 2;
        roundedRectPath(ctx, 12, 12, screenWidth - 24, screenHeight - 24, 20);
        ctx.stroke();
        ctx.restore();
      }

      function draw() {
        resizeCanvas();
        const { width: screenWidth, height: screenHeight, ratio } = getScreenSize();
        const activeNodes = getActiveNodeSet();

        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        context.clearRect(0, 0, screenWidth, screenHeight);

        drawBackground(context, screenWidth, screenHeight, ratio);
        applyWorldTransform(context, ratio, screenWidth, screenHeight);
        drawGuide(context);
        drawBoundaryArrows(context);
        drawFrame(context);
        drawEdges(context, activeNodes);
        nodes.forEach((node) => drawNode(context, node, activeNodes));
        drawCaption(context);

        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        drawControls(context, screenWidth, screenHeight);
        drawFocusRing(context, screenWidth, screenHeight);
      }

      function hitTest(clientX, clientY) {
        const worldPoint = screenToWorld(clientX, clientY);
        return nodes.find((node) => worldPoint.x >= node.x && worldPoint.x <= node.x + node.width && worldPoint.y >= node.y && worldPoint.y <= node.y + node.height);
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.focus();
        dragState = { x: event.clientX, y: event.clientY, moved: false };
        canvas.style.cursor = "grabbing";
      });

      window.addEventListener("pointermove", (event) => {
        if (!dragState) {
          return;
        }

        const dx = ((event.clientX - dragState.x) / window.innerWidth) * camera.width;
        const dy = ((event.clientY - dragState.y) / window.innerHeight) * camera.height;
        dragState = { x: event.clientX, y: event.clientY, moved: true };
        panBy(-dx, -dy);
      });

      window.addEventListener("pointerup", (event) => {
        if (!dragState) {
          return;
        }

        const releasedWithoutDrag = !dragState.moved;
        dragState = null;
        canvas.style.cursor = "grab";

        if (releasedWithoutDrag) {
          const hitNode = hitTest(event.clientX, event.clientY);
          if (hitNode) {
            if (hitNode.layer === "APPLICATION FLOW") {
              selectedFlowId = hitNode.id;
              selectedNodeId = null;
            } else {
              selectedFlowId = null;
              selectedNodeId = hitNode.id;
            }
            draw();
          }
        }
      });

      canvas.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();

          if (event.ctrlKey || event.metaKey) {
            zoomBy(event.deltaY > 0 ? 1.08 : 0.92);
            return;
          }

          const dx = (event.deltaX / window.innerWidth) * camera.width;
          const dy = (event.deltaY / window.innerHeight) * camera.height;
          panBy(dx, dy);
        },
        { passive: false },
      );

      canvas.addEventListener("keydown", (event) => {
        const step = (event.shiftKey ? 180 : 72) * (camera.width / initialCamera.width);

        switch (event.key) {
          case "ArrowLeft":
          case "a":
          case "A":
            event.preventDefault();
            panBy(-step, 0);
            break;
          case "ArrowRight":
          case "d":
          case "D":
            event.preventDefault();
            panBy(step, 0);
            break;
          case "ArrowUp":
          case "w":
          case "W":
            event.preventDefault();
            panBy(0, -step);
            break;
          case "ArrowDown":
          case "s":
          case "S":
            event.preventDefault();
            panBy(0, step);
            break;
          case "+":
          case "=":
            event.preventDefault();
            zoomBy(0.92);
            break;
          case "-":
          case "_":
            event.preventDefault();
            zoomBy(1.08);
            break;
          case "0":
            event.preventDefault();
            resetCamera();
            break;
          default:
            break;
        }
      });

      canvas.addEventListener("focus", draw);
      canvas.addEventListener("blur", draw);
      window.addEventListener("resize", draw);

      draw();
    </script>
  </body>
</html>
