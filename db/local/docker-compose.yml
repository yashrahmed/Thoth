name: local-thoth-db

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: thoth-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - wal_compression=on
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER} -d ${LOCAL_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  localstack:
    image: localstack/localstack:3.0.2
    container_name: thoth-localstack-local
    restart: unless-stopped
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"
      LOCALSTACK_HOST: localhost
      PERSISTENCE: "1"
    ports:
      - "4566:4566"
    volumes:
      - ./blob-store:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d

  flyway:
    image: redgate/flyway:11-alpine
    platform: linux/amd64
    profiles:
      - migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_DEFAULT_SCHEMA: flyway
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${LOCAL_POSTGRES_DB}
      FLYWAY_SCHEMAS: flyway,thoth
      FLYWAY_USER: ${LOCAL_POSTGRES_USER}
      FLYWAY_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ../migrations:/flyway/sql
