name: thoth-int-test-launch

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: thoth_test
      POSTGRES_USER: thoth
      POSTGRES_PASSWORD: thoth
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "55432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - wal_compression=on
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thoth -d thoth_test"]
      interval: 2s
      timeout: 5s
      retries: 30

  flyway:
    image: redgate/flyway:11-alpine
    platform: linux/amd64
    profiles:
      - migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_DEFAULT_SCHEMA: flyway
      FLYWAY_URL: jdbc:postgresql://postgres:5432/thoth_test
      FLYWAY_SCHEMAS: flyway,thoth
      FLYWAY_USER: thoth
      FLYWAY_PASSWORD: thoth
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ../packages/conv-agent/resources/db/migrations:/flyway/sql:ro

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: us-east-1
    command: server /data --console-address :9001
    ports:
      - "59000:9000"

  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          sleep 1
        done
        mc mb --ignore-existing local/thoth-test
