name: thoth-local-launch

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: thoth-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - wal_compression=on
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER} -d ${LOCAL_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/_data:/var/lib/postgresql/data
      - ./data/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: thoth-minio-local
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: us-east-1
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: thoth-minio-setup
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          sleep 1
        done
        mc mb --ignore-existing local/thoth-local-blob-store

  flyway:
    image: redgate/flyway:11-alpine
    platform: linux/amd64
    profiles:
      - migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_DEFAULT_SCHEMA: flyway
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${LOCAL_POSTGRES_DB}
      FLYWAY_SCHEMAS: flyway,thoth
      FLYWAY_USER: ${LOCAL_POSTGRES_USER}
      FLYWAY_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ../packages/conv-agent/resources/db/migrations:/flyway/sql
