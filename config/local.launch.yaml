# Local launch template for `scripts/launch-all-local.sh`.
# On `start`, the launcher reads `OPENAI_API_KEY` from `llm-creds.yaml` and
# `R2_ACCESS_KEY_ID` / `R2_SECRET_ACCESS_KEY` from `cloudflare-creds.yaml`,
# exports them into the service process environment, copies this file to
# `/tmp/thoth-local/local.launch.yaml`, and starts services with `CONFIG_FILE`
# pointing at that generated file.
# This committed file stays non-secret and is not used directly at runtime.

ports:
  proxy: 3000
  convAgent: 3001
  kbCurateAgent: 3002
  planningAgent: 3003

convStore:
  db:
    host: localhost
    port: 5432
    database: thoth
    user: thoth
    password: thoth
    ssl: false
