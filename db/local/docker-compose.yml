name: local-thoth-db

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: thoth-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: thoth
      POSTGRES_USER: thoth
      POSTGRES_PASSWORD: thoth
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - wal_compression=on
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thoth -d thoth"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  flyway:
    image: redgate/flyway:11-alpine
    platform: linux/amd64
    profiles:
      - migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_DEFAULT_SCHEMA: flyway
      FLYWAY_URL: jdbc:postgresql://postgres:5432/thoth
      FLYWAY_SCHEMAS: flyway,public
      FLYWAY_USER: thoth
      FLYWAY_PASSWORD: thoth
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ../migrations:/flyway/sql
